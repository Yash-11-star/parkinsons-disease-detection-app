<div class="container" style="margin-top: 50px; height: 100vh; color: black;">
    <div class="centering" style="padding: 0;margin: 0;justify-content: space-between; text-align: center; overflow: hidden; 
      height: 100vh; ;"> <br><br>
        <h4 style="color: #3f51b5; font-family: sans-serif; font-size: 40px; font-weight: 700;">Welcome to Parkinson's
            Disease Detector</h4>
        <div class="card glow-effect">
            <div class="row">
            <div class="col">
                <h4 style="color: red; margin-top: 30px;">Enter details </h4>
            <div class="centering input-group mb-3" style="width: 30%; margin-top: 30px;">
                <span class="input-group-text" id="basic-addon1">Username</span>
                <input #username type="text" class="form-control" placeholder="Enter username" aria-label="Username"
                    aria-describedby="basic-addon1">
            </div>
            <div class="centering input-group mb-3" style="width: 30%; margin-top: 30px;">
                <span class="input-group-text" id="basic-addon1">Password</span>
                <input #password type="password" class="form-control" placeholder="Enter password" aria-label="Password"
                    aria-describedby="basic-addon1">
            </div>
            <div class="centering input-group mb-3" style="width: 30%; margin-top: 30px;">
                <span class="input-group-text" id="basic-addon1">Age</span>
                <input #age type="number" class="form-control" placeholder="Enter age" aria-label="Age"
                    aria-describedby="basic-addon1">
            </div>
            <div style="margin-top: 20px; font-size: larger;">
                <label  for="gender">Choose your gender : </label>
                <select #gender name="gender" id="gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            <div style="margin-top: 30px; margin-bottom: 30px;">
                <button class="btn btn-success"
                    (click)="registerUser(username.value,password.value, age.valueAsNumber, gender.value)">Register</button>
            </div>
            </div>
            <div class="col-3" style="margin-left: -200px; margin-right: 150px; margin-top: 50px;">
                <img src="../../assets/doctor-removebg-preview.png" width="250px" height="300px" alt="">
            </div>
            
        </div>
    </div>
    </div>
</div>
