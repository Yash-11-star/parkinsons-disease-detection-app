<div class="container" style="margin-top: 50px; height: 100vh;">
    <div class="centering" style="padding: 0;margin: 0;justify-content: space-between; text-align: center; overflow: hidden; 
      height: 100vh; ;">
        <h4 style="color: #3f51b5; font-family: sans-serif; font-size: 40px; font-weight: 700; margin-top: 30px;">Welcome to Parkinson's
            Disease Detector</h4>
        <div class="card glow-effect">
            <h4 style="color: #3f51b5; margin-top: 60px; font-weight: 300; font-size: 25px;">Enter login details </h4>
            <div class="centering input-group mb-3" style="width: 30%; margin-top: 30px;">
                <span class="input-group-text" id="basic-addon1">Email ID</span>
                <input #username type="text" class="form-control" placeholder="johndoe@gmail.com" aria-label="Username"
                    aria-describedby="basic-addon1">
            </div>
            <div class="centering input-group mb-3" style="width: 30%; margin-top: 30px;">
                <span class="input-group-text" id="basic-addon1">Password</span>
                <input #password type="password" class="form-control" placeholder="john@1234" aria-label="Password"
                    aria-describedby="basic-addon1">
            </div>
            <div>
                <button class="btn btn-success" (click)="getUser(username.value,password.value)">Login</button>
            </div>
            <div style="margin-top: 30px;">
                <h4 style="color: black;">If not registered then <span><a style="text-decoration: none;" href="register">Register here</a></span> </h4>
            </div>
        </div>
        <img src="../../assets/doctor-penguin.gif" width="300px" height="300px" alt="">
    </div>

</div>
