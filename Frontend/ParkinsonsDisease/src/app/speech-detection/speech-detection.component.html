<div class="container-fluid">
    <div class="row" style="padding: 0;margin: 0;justify-content: space-between; text-align: center; overflow: hidden;">
      <div class="row" style="text-align: center; margin-top: 20px; width: 100%;">
        <p style="font-size: 40px;">Speech-based Disease Detection</p>
      </div>
      <div class="row" style="text-align: center; margin-top: 20px; width: 100%;">
        <p style="font-size: 20px;">Upload the recorded audio which is to be detected: </p>
        <!-- app.component.html --> <br>
        <input type="file" (change)="onFileSelected($event)">
        <button (click)="uploadAudio()">Upload Audio</button>
      </div>
    </div>
</div>
